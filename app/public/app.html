<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وسيط CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1B4F8C;--blue-d:#133a68;--blue-l:#D6E4F5;
  --green:#1D7A4E;--green-l:#D6EDE0;
  --red:#DC2626;--red-l:#FEE2E2;
  --orange:#D97706;--orange-l:#FEF3C7;
  --text:#1A1A1A;--gray:#6B7280;--border:#E5E7EB;
  --bg:#F3F6FB;--white:#fff;
  --sidebar:240px;--radius:12px;
  --shadow:0 2px 12px rgba(27,79,140,.10);
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
a{text-decoration:none;color:inherit}
button{font-family:'Cairo',sans-serif;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:'Cairo',sans-serif;font-size:15px}

/* ── LAYOUT ── */
#app{display:flex;min-height:100vh}
#sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--blue);color:#fff;
  display:flex;flex-direction:column;
  position:fixed;top:0;right:0;bottom:0;z-index:50;
  overflow-y:auto;
}
#main{margin-right:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;
}
#content{padding:28px;flex:1}

/* ── SIDEBAR ── */
.sidebar-logo{
  padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;gap:10px;
}
.sidebar-logo .icon{
  width:36px;height:36px;background:rgba(255,255,255,.18);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:18px;
}
.sidebar-logo .name{font-size:18px;font-weight:700}
.sidebar-logo .sub{font-size:11px;opacity:.6;margin-top:2px}

nav.sidebar-nav{padding:12px 0;flex:1}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;font-size:14px;font-weight:600;
  color:rgba(255,255,255,.75);cursor:pointer;
  border-right:3px solid transparent;
  transition:all .15s;
}
.nav-item:hover,.nav-item.active{
  color:#fff;background:rgba(255,255,255,.1);
  border-right-color:#6EE7A0;
}
.nav-item .ico{font-size:18px;width:22px;text-align:center}
.nav-badge{
  margin-right:auto;background:#EF4444;color:#fff;
  font-size:11px;font-weight:700;padding:2px 7px;border-radius:50px;min-width:20px;text-align:center;
}

.sidebar-footer{
  padding:16px;border-top:1px solid rgba(255,255,255,.12);
  font-size:13px;color:rgba(255,255,255,.55);
}
.trial-bar{
  background:rgba(255,200,0,.15);border:1px solid rgba(255,200,0,.3);
  border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;
  color:rgba(255,255,255,.85);
}

/* ── TOPBAR ── */
.page-title{font-size:20px;font-weight:700;color:var(--blue)}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-chip{
  display:flex;align-items:center;gap:8px;
  background:var(--bg);border-radius:8px;padding:6px 12px;font-size:14px;
}
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--green));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;
}

/* ── CARDS / GRIDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{
  background:var(--white);border-radius:var(--radius);padding:20px;
  border:1px solid var(--border);box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:6px;
}
.stat-card .label{font-size:13px;color:var(--gray);font-weight:600}
.stat-card .value{font-size:32px;font-weight:900;color:var(--blue)}
.stat-card .icon{font-size:28px}
.stat-card.green .value{color:var(--green)}
.stat-card.orange .value{color:var(--orange)}
.stat-card.red .value{color:var(--red)}

.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:16px;font-weight:700;color:var(--blue)}
.card-body{padding:20px}

/* ── BUTTONS ── */
.btn{
  padding:9px 18px;border-radius:8px;font-size:14px;font-weight:700;
  font-family:'Cairo',sans-serif;cursor:pointer;border:none;
  display:inline-flex;align-items:center;gap:6px;transition:all .15s;
}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-d)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#145c39}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:var(--red-l);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-icon{width:34px;height:34px;padding:0;justify-content:center;border-radius:8px}

/* ── TABLES ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:13px;font-weight:700;color:var(--gray);padding:10px 14px;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tr:hover td{background:#f9fafc}
tr:last-child td{border-bottom:none}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:12px;font-weight:700;white-space:nowrap}
.badge-blue{background:var(--blue-l);color:var(--blue)}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-orange{background:var(--orange-l);color:var(--orange)}
.badge-gray{background:#F3F4F6;color:var(--gray)}

/* ── FORMS ── */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;font-weight:700;color:var(--gray)}
.form-group input,.form-group select,.form-group textarea{
  border:1.5px solid var(--border);border-radius:8px;
  padding:9px 12px;font-size:14px;color:var(--text);
  transition:border .15s;background:var(--white);
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  outline:none;border-color:var(--blue);
}
.form-group textarea{resize:vertical;min-height:80px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:none;align-items:center;justify-content:center;z-index:200;
  padding:20px;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--white);border-radius:16px;width:100%;max-width:560px;
  max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal-header{
  padding:20px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--white);z-index:10;
}
.modal-header h2{font-size:18px;font-weight:700;color:var(--blue)}
.modal-close{font-size:22px;color:var(--gray);cursor:pointer;padding:4px 8px;border-radius:6px}
.modal-close:hover{background:var(--border)}
.modal-body{padding:24px}

/* ── KANBAN ── */
.kanban-wrap{overflow-x:auto;padding-bottom:20px}
.kanban{display:flex;gap:16px;align-items:flex-start;min-width:max-content}
.kanban-col{
  width:260px;background:var(--bg);border-radius:var(--radius);
  border:1px solid var(--border);flex-shrink:0;
}
.kanban-col-header{
  padding:12px 16px;font-size:14px;font-weight:700;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  border-radius:var(--radius) var(--radius) 0 0;
}
.kanban-col-body{padding:10px;min-height:200px;display:flex;flex-direction:column;gap:8px}
.kanban-card{
  background:var(--white);border-radius:10px;border:1px solid var(--border);
  padding:14px;cursor:grab;transition:box-shadow .15s;
}
.kanban-card:hover{box-shadow:var(--shadow)}
.kanban-card.dragging{opacity:.5;cursor:grabbing}
.kanban-col.drag-over .kanban-col-body{background:var(--blue-l)}
.kanban-card h4{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--text)}
.kanban-card .meta{font-size:12px;color:var(--gray);display:flex;flex-direction:column;gap:3px}
.kanban-card .value-tag{
  margin-top:8px;font-size:13px;font-weight:700;color:var(--green);
}

/* ── EMPTY STATES ── */
.empty{text-align:center;padding:60px 20px;color:var(--gray)}
.empty .emoji{font-size:48px;margin-bottom:12px}
.empty h3{font-size:17px;font-weight:700;margin-bottom:6px;color:var(--text)}
.empty p{font-size:14px}

/* ── SEARCH BAR ── */
.search-bar{
  display:flex;gap:10px;align-items:center;
  margin-bottom:20px;flex-wrap:wrap;
}
.search-input-wrap{position:relative;flex:1;min-width:200px}
.search-input-wrap input{width:100%;padding:9px 14px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:14px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--gray)}

/* ── DASHBOARD SPLIT ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}
.followup-item{
  display:flex;align-items:center;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border);
}
.followup-item:last-child{border-bottom:none}
.followup-item .name{font-weight:700;font-size:14px}
.followup-item .note{font-size:12px;color:var(--gray)}
.followup-item .date{font-size:11px;color:var(--orange);margin-top:2px;font-weight:600}
.contact-row-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.contact-row-item:last-child{border-bottom:none}

/* ── PROPERTIES GRID ── */
.prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.prop-card{
  background:var(--white);border-radius:var(--radius);border:1px solid var(--border);
  overflow:hidden;box-shadow:var(--shadow);
}
.prop-thumb{
  height:140px;background:linear-gradient(135deg,var(--blue-l),#c5d8f5);
  display:flex;align-items:center;justify-content:center;font-size:48px;
}
.prop-body{padding:16px}
.prop-title{font-size:15px;font-weight:700;margin-bottom:6px}
.prop-price{font-size:20px;font-weight:900;color:var(--green);margin-bottom:8px}
.prop-meta{font-size:12px;color:var(--gray);display:flex;flex-wrap:wrap;gap:8px}
.prop-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}

/* ── TEAM ── */
.agent-card{
  background:var(--white);border-radius:var(--radius);border:1px solid var(--border);
  padding:20px;display:flex;align-items:center;gap:16px;
}
.agent-avatar{
  width:52px;height:52px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--green));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:22px;font-weight:700;
}
.agent-info{flex:1}
.agent-name{font-size:16px;font-weight:700}
.agent-email{font-size:13px;color:var(--gray);margin-top:2px}
.agent-stats{display:flex;gap:16px;margin-top:10px}
.agent-stat{font-size:12px;color:var(--gray)}
.agent-stat strong{display:block;font-size:18px;color:var(--blue);font-weight:900}

/* ── ALERTS ── */
.alert{border-radius:8px;padding:12px 16px;font-size:14px;font-weight:600;margin-bottom:16px}
.alert-success{background:var(--green-l);color:var(--green)}
.alert-error{background:var(--red-l);color:var(--red)}

/* ── LOADING ── */
.spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{display:flex;justify-content:center;padding:40px}

/* ── SETTINGS ── */
.settings-section{margin-bottom:32px}
.settings-section h3{font-size:16px;font-weight:700;color:var(--blue);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.plan-card{
  background:linear-gradient(135deg,var(--blue),var(--green));
  color:#fff;border-radius:var(--radius);padding:24px;margin-bottom:20px;
}
.plan-name{font-size:22px;font-weight:900;margin-bottom:4px}
.plan-expires{font-size:14px;opacity:.8}
.plan-upgrade{margin-top:16px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #sidebar{right:-240px;transition:.3s;box-shadow:none}
  #sidebar.open{right:0;box-shadow:4px 0 20px rgba(0,0,0,.2)}
  #main{margin-right:0}
  #content{padding:16px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .kanban{padding-bottom:60px}
}
</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="icon">و</div>
      <div>
        <div class="name">وسيط CRM</div>
        <div class="sub">لوحة التحكم</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard">
        <span class="ico">📊</span> لوحة التحكم
      </div>
      <div class="nav-item" data-page="contacts">
        <span class="ico">👥</span> العملاء
      </div>
      <div class="nav-item" data-page="deals">
        <span class="ico">💼</span> الصفقات
      </div>
      <div class="nav-item" data-page="properties">
        <span class="ico">🏠</span> العقارات
      </div>
      <div class="nav-item" data-page="followups">
        <span class="ico">🔔</span> التذكيرات
        <span class="nav-badge" id="followup-badge" style="display:none">0</span>
      </div>
      <div class="nav-item" data-page="team">
        <span class="ico">👤</span> الفريق
      </div>
      <div class="nav-item" data-page="settings">
        <span class="ico">⚙️</span> الإعدادات
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="trial-bar" id="trial-info">⏳ جاري التحميل...</div>
      <div style="font-size:12px">وسيط CRM © 2026</div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div class="page-title" id="page-title">لوحة التحكم</div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" id="topbar-add-btn" onclick="openAddModal()">+ إضافة</button>
        <div class="user-chip">
          <div class="avatar" id="user-avatar">خ</div>
          <span id="user-name">...</span>
        </div>
        <button class="btn btn-outline btn-sm" onclick="logout()">خروج</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">إضافة</h2>
      <span class="modal-close" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let currentPage = 'dashboard';
let currentUser = null;
let currentAgency = null;
let editingId = null;

// ── API ────────────────────────────────────────────────────────────────────
const TOKEN_KEY = 'waseet_token';

function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); }

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/api' + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'خطأ');
  return data;
}

// ── AUTH CHECK ─────────────────────────────────────────────────────────────
async function initApp() {
  if (!getToken()) {
    window.location.href = '/login.html';
    return;
  }
  try {
    const {user, agency} = await api('GET', '/auth/me');
    currentUser = user;
    currentAgency = agency;
    document.getElementById('user-name').textContent = user.name;
    document.getElementById('user-avatar').textContent = user.name.charAt(0);
    // Trial info
    const trialEl = document.getElementById('trial-info');
    if (agency.plan === 'trial' && agency.trial_ends) {
      const days = Math.ceil((new Date(agency.trial_ends) - new Date()) / 86400000);
      trialEl.textContent = days > 0 ? `⏳ ${days} يوم متبقي من التجربة` : '⚠️ انتهت فترة التجربة';
      trialEl.style.borderColor = days < 7 ? 'rgba(255,100,100,.5)' : 'rgba(255,200,0,.3)';
    } else {
      trialEl.textContent = `✅ خطة ${agency.plan}`;
    }
    // Admin-only items
    if (user.role !== 'admin') document.querySelector('[data-page="team"]').style.display = 'none';
    navigate('dashboard');
    loadFollowupBadge();
  } catch(e) {
    clearToken();
    window.location.href = '/login.html';
  }
}

async function loadFollowupBadge() {
  try {
    const {followups} = await api('GET', '/followups');
    const badge = document.getElementById('followup-badge');
    if (followups.length > 0) {
      badge.textContent = followups.length;
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  } catch(e) {}
}

function logout() {
  clearToken();
  window.location.href = '/login.html';
}

// ── NAVIGATION ────────────────────────────────────────────────────────────
const PAGE_TITLES = {
  dashboard: 'لوحة التحكم', contacts: 'العملاء', deals: 'الصفقات',
  properties: 'العقارات', followups: 'التذكيرات', team: 'الفريق', settings: 'الإعدادات'
};
const ADD_LABELS = {
  contacts: '+ عميل جديد', deals: '+ صفقة جديدة', properties: '+ عقار جديد',
  followups: '+ تذكير جديد', team: '+ دعوة وسيط'
};

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.getElementById('page-title').textContent = PAGE_TITLES[page] || page;
  const addBtn = document.getElementById('topbar-add-btn');
  addBtn.textContent = ADD_LABELS[page] || '+ إضافة';
  addBtn.style.display = ADD_LABELS[page] ? 'flex' : 'none';
  renderPage(page);
}

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => navigate(el.dataset.page));
});

// ── PAGES ─────────────────────────────────────────────────────────────────
async function renderPage(page) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  try {
    switch(page) {
      case 'dashboard':  await renderDashboard(); break;
      case 'contacts':   await renderContacts(); break;
      case 'deals':      await renderDeals(); break;
      case 'properties': await renderProperties(); break;
      case 'followups':  await renderFollowups(); break;
      case 'team':       await renderTeam(); break;
      case 'settings':   renderSettings(); break;
    }
  } catch(e) {
    content.innerHTML = `<div class="alert alert-error">خطأ: ${e.message}</div>`;
  }
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
async function renderDashboard() {
  const {stats, recent_contacts, followups_today} = await api('GET', '/dashboard');
  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="icon">👥</div><div class="label">إجمالي العملاء</div><div class="value">${stats.contacts}</div></div>
      <div class="stat-card"><div class="icon">💼</div><div class="label">صفقات مفتوحة</div><div class="value">${stats.open_deals}</div></div>
      <div class="stat-card green"><div class="icon">✅</div><div class="label">مغلقة هذا الشهر</div><div class="value">${stats.closed_this_month}</div></div>

// ── DEALS (KANBAN) ─────────────────────────────────────────────────────────
const STAGES = ['جديد','معاينة','عرض سعر','تفاوض','مغلقة'];
const STAGE_COLORS = {'جديد':'var(--blue)','معاينة':'var(--orange)','عرض سعر':'#7C3AED','تفاوض':'#DB2777','مغلقة':'var(--green)'};

async function renderDeals() {
  const {deals} = await api('GET', '/deals');
  const byStage = {};
  STAGES.forEach(s => byStage[s] = []);
  deals.forEach(d => { if (byStage[d.stage]) byStage[d.stage].push(d); else byStage['جديد'].push(d); });

  document.getElementById('content').innerHTML = `
    <div class="kanban-wrap">
      <div class="kanban">
        ${STAGES.map(stage => `
          <div class="kanban-col" data-stage="${stage}" ondragover="allowDrop(event)" ondrop="dropDeal(event,'${stage}')">
            <div class="kanban-col-header" style="border-top:3px solid ${STAGE_COLORS[stage]}">
              <span>${stage}</span>
              <span class="badge badge-gray">${byStage[stage].length}</span>
            </div>
            <div class="kanban-col-body">
              ${byStage[stage].map(d => `
                <div class="kanban-card" draggable="true" id="deal-${d.id}"
                     ondragstart="dragDeal(event,${d.id})"
                     ondragend="endDragDeal(event)">
                  <h4>${d.title}</h4>
                  <div class="meta">
                    ${d.contact_name ? `<span>👤 ${d.contact_name}</span>` : ''}
                    ${d.agent_name ? `<span>🧑‍💼 ${d.agent_name}</span>` : ''}
                    ${d.expected_close ? `<span>📅 ${formatDate(d.expected_close)}</span>` : ''}
                  </div>
                  ${d.value ? `<div class="value-tag">💰 ${formatSAR(d.value)}</div>` : ''}
                  <div style="margin-top:10px;display:flex;gap:6px">
                    <button class="btn btn-outline btn-sm" style="flex:1" onclick="editDeal(${d.id})">تعديل</button>
                    <button class="btn btn-danger btn-sm btn-icon" onclick="deleteDeal(${d.id})">🗑️</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

let draggingDealId = null;

function dragDeal(e, id) {
  draggingDealId = id;
  e.target.classList.add('dragging');
}
function endDragDeal(e) { e.target.classList.remove('dragging'); }
function allowDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
async function dropDeal(e, stage) {
  e.preventDefault();
  document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
  if (!draggingDealId) return;
  await api('PUT', '/deals/' + draggingDealId, { stage, ...(stage === 'مغلقة' ? {is_won:1} : {}) });
  renderDeals();
}

        <div class="form-group"><label>الوسيط المسؤول</label>

async function saveDeal(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = Object.fromEntries(fd);
  if (data.value) data.value = parseFloat(data.value);
  if (data.commission_pct) data.commission_pct = parseFloat(data.commission_pct);

  try {
    if (editingId) await api('PUT', '/deals/' + editingId, data);
    else await api('POST', '/deals', data);
    closeModal(); renderDeals();
  } catch(err) { alert(err.message); }
}

async function editDeal(id) {
  const {deals} = await api('GET', '/deals');

  editingId = id;
  openModal('تعديل الصفقة', await dealForm(d));
}

async function deleteDeal(id) {

}

// ── FOLLOW-UPS ────────────────────────────────────────────────────────────
async function renderFollowups() {
  const {followups} = await api('GET', '/followups');
  const today = new Date().toISOString().split('T')[0];
  const overdue = followups.filter(f => f.due_date < today);
  const todayF  = followups.filter(f => f.due_date === today);
  const upcoming = followups.filter(f => f.due_date > today);

  function fRow(f) {
    const isOverdue = f.due_date < today;
    return `
      <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
        <div class="avatar" style="width:38px;height:38px;font-size:14px;flex-shrink:0">${(f.contact_name||'؟').charAt(0)}</div>
        <div style="flex:1">
          <div style="font-weight:700">${f.contact_name||'بدون عميل'}</div>
          ${f.note ? `<div style="font-size:13px;color:var(--gray)">${f.note}</div>` : ''}
          <div style="font-size:12px;color:${isOverdue?'var(--red)':'var(--orange)'};font-weight:600;margin-top:2px">
            ${isOverdue?'⚠️ متأخر: ':''} ${formatDate(f.due_date)}
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-green btn-sm" onclick="doneFollowup(${f.id})">تم ✓</button>
          <button class="btn btn-danger btn-sm btn-icon" onclick="deleteFollowup(${f.id})">🗑️</button>
        </div>
      </div>
    `;
  }

  document.getElementById('content').innerHTML = `
    ${overdue.length ? `
    <div class="card" style="margin-bottom:20px;border-color:var(--red)">
      <div class="card-header"><h3 style="color:var(--red)">⚠️ متأخرة (${overdue.length})</h3></div>
      <div class="card-body">${overdue.map(fRow).join('')}</div>
    </div>` : ''}

    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><h3>📅 اليوم (${todayF.length})</h3></div>
      <div class="card-body">
        ${todayF.length ? todayF.map(fRow).join('') : '<div class="empty" style="padding:20px"><div>🎉 لا تذكيرات اليوم!</div></div>'}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3>🗓️ قادمة (${upcoming.length})</h3></div>
      <div class="card-body">
        ${upcoming.length ? upcoming.map(fRow).join('') : '<div class="empty" style="padding:20px"><div>لا تذكيرات قادمة</div></div>'}
      </div>
    </div>
  `;
  loadFollowupBadge();
}

async function doneFollowup(id) {
  await api('PUT', '/followups/' + id + '/done', {});
  if (currentPage === 'followups') renderFollowups();
  else if (currentPage === 'dashboard') renderDashboard();
  loadFollowupBadge();
}

  if (!confirm('حذف التذكير؟')) return;
  await api('DELETE', '/followups/' + id);

async function followupForm() {
  const {contacts} = await api('GET', '/contacts');
  const today = new Date().toISOString().split('T')[0];
  return `
    <form onsubmit="saveFollowup(event)">
      <div class="form-grid">
        <div class="form-group"><label>العميل</label>
          <select name="contact_id">
            <option value="">اختر عميل...</option>
            ${contacts.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>تاريخ التذكير *</label><input name="due_date" type="date" value="${today}" required></div>
      </div>
      <div class="form-group" style="margin-top:14px"><label>الملاحظة</label><textarea name="note" placeholder="ماذا تريد أن تفعل؟"></textarea></div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal()">إلغاء</button>
        <button type="submit" class="btn btn-primary">💾 حفظ</button>
      </div>
    </form>
  `;
}

async function saveFollowup(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = Object.fromEntries(fd);
  if (!data.contact_id) delete data.contact_id;
  try {
    await api('POST', '/followups', data);
    closeModal(); renderFollowups();
  } catch(err) { alert(err.message); }
}

// ── TEAM ──────────────────────────────────────────────────────────────────

              <div class="agent-stat"><strong>${a.contact_count}</strong>عميل</div>
              <div class="agent-stat"><strong>${a.open_deals}</strong>صفقة مفتوحة</div>
              <div class="agent-stat"><strong>${a.closed_month}</strong>مغلقة هذا الشهر</div>
            </div>
          </div>
          ${a.id !== currentUser.id ? `

async function saveAgent(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = Object.fromEntries(fd);
  try {
    const res = await api('POST', '/team', data);

async function toggleAgent(id, isActive) {
  await api('PUT', '/team/' + id + '/toggle', {is_active: isActive});

}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(title, html) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

async function openAddModal() {
  editingId = null;
  switch(currentPage) {
    case 'contacts':   openModal('عميل جديد', contactForm()); break;
    case 'deals':      openModal('صفقة جديدة', await dealForm()); break;
    case 'properties': openModal('عقار جديد', propertyForm()); break;
    case 'followups':  openModal('تذكير جديد', await followupForm()); break;
    case 'team':       openModal('دعوة وسيط', agentForm()); break;
  }
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function formatSAR(n) {
  if (!n && n !== 0) return '—';
  return Number(n).toLocaleString('ar-SA') + ' ريال';
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ar-SA', {year:'numeric',month:'short',day:'numeric'});
}

function statusBadge(status) {
  const map = {
    'جديد':'badge-blue', 'متابعة':'badge-orange', 'مهتم':'badge-green',
    'غير مهتم':'badge-red', 'مغلق':'badge-gray',
    'متاح':'badge-green', 'محجوز':'badge-orange', 'مباع':'badge-gray',
  };
  return `<span class="badge ${map[status]||'badge-gray'}">${status||'—'}</span>`;
}
