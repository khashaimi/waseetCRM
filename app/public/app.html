<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waseet CRM | وسيط</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1B4F8C;--blue-d:#133a68;--blue-l:#D6E4F5;
  --green:#1D7A4E;--green-l:#D6EDE0;
  --red:#DC2626;--red-l:#FEE2E2;
  --orange:#D97706;--orange-l:#FEF3C7;
  --text:#1A1A1A;--text-2:#6B7280;
  --border:#E5E7EB;--bg:#F3F6FB;--card:#fff;
  --sidebar-bg:#1B4F8C;--topbar-bg:#fff;
  --shadow:0 2px 12px rgba(27,79,140,.10);
  --input-bg:#fff;--sidebar:240px;--radius:12px;
}
[data-theme="dark"]{
  --text:#E8EFFE;--text-2:#9CA3AF;
  --border:#253047;--bg:#0F1929;--card:#172030;
  --sidebar-bg:#0d1a2d;--topbar-bg:#172030;
  --shadow:0 2px 16px rgba(0,0,0,.35);--input-bg:#1f2d42;
  --blue-l:#1a2d47;--green-l:#0e2218;--red-l:#2d1212;--orange-l:#2d1e08;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{transition:background .25s,color .25s}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);font-size:15px;transition:background .25s,color .25s}
[lang="en"] body,[lang="en"] input,[lang="en"] button,[lang="en"] select,[lang="en"] textarea{font-family:'Inter',sans-serif}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit;font-size:15px}

@keyframes fadeInUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(-10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.page-enter{animation:fadeInUp .28s ease both}
.page-enter>*{animation:fadeInUp .32s ease both}
.page-enter>*:nth-child(1){animation-delay:.05s}
.page-enter>*:nth-child(2){animation-delay:.1s}
.page-enter>*:nth-child(3){animation-delay:.15s}
.page-enter>*:nth-child(4){animation-delay:.2s}
.page-enter>*:nth-child(5){animation-delay:.25s}
.page-enter>*:nth-child(6){animation-delay:.3s}

#app{display:flex;min-height:100vh}
#sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--sidebar-bg);color:#fff;
  display:flex;flex-direction:column;
  position:fixed;top:0;right:0;bottom:0;z-index:50;
  overflow-y:auto;transition:background .25s,right .3s;
}
[dir="ltr"] #sidebar{right:auto;left:0}
#main{margin-right:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
[dir="ltr"] #main{margin-right:0;margin-left:var(--sidebar)}
#topbar{
  background:var(--topbar-bg);border-bottom:1px solid var(--border);
  padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;
  box-shadow:0 1px 6px rgba(0,0,0,.06);transition:background .25s;
}
#content{padding:28px;flex:1}

.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:10px}
.sidebar-logo .icon{width:38px;height:38px;background:rgba(255,255,255,.18);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;flex-shrink:0}
.sidebar-logo .name{font-size:17px;font-weight:700}
.sidebar-logo .sub{font-size:11px;opacity:.6;margin-top:2px}

nav.sidebar-nav{padding:12px 0;flex:1}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:12px 20px;
  font-size:14px;font-weight:600;color:rgba(255,255,255,.75);cursor:pointer;
  border-right:3px solid transparent;transition:all .18s;
}
[dir="ltr"] .nav-item{border-right:none;border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{color:#fff;background:rgba(255,255,255,.1);border-right-color:#6EE7A0}
[dir="ltr"] .nav-item:hover,[dir="ltr"] .nav-item.active{border-right-color:transparent;border-left-color:#6EE7A0}
.nav-item .ico{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.nav-badge{margin-right:auto;background:#EF4444;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:50px;min-width:20px;text-align:center}
[dir="ltr"] .nav-badge{margin-right:0;margin-left:auto}

.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,.12);font-size:13px;color:rgba(255,255,255,.55)}
.trial-bar{background:rgba(255,200,0,.15);border:1px solid rgba(255,200,0,.3);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:rgba(255,255,255,.85)}

.page-title{font-size:20px;font-weight:700;color:var(--blue)}
.topbar-right{display:flex;align-items:center;gap:10px}
.icon-btn{
  width:36px;height:36px;border-radius:8px;background:transparent;
  border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;transition:all .15s;color:var(--text);
}
.icon-btn:hover{background:var(--bg);border-color:var(--blue)}
.user-chip{
  display:flex;align-items:center;gap:8px;background:var(--bg);
  border-radius:8px;padding:5px 12px 5px 8px;font-size:14px;cursor:pointer;
  transition:all .15s;border:1.5px solid transparent;
}
[dir="ltr"] .user-chip{padding:5px 8px 5px 12px}
.user-chip:hover{border-color:var(--blue)}
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--green));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;
}
.lang-pill{
  font-size:12px;font-weight:700;padding:5px 10px;border-radius:20px;
  border:1.5px solid var(--border);cursor:pointer;transition:all .15s;
  background:transparent;color:var(--text);
}
.lang-pill:hover{border-color:var(--blue);color:var(--blue)}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:16px;margin-bottom:28px}
.stat-card{
  background:var(--card);border-radius:var(--radius);padding:20px;
  border:1px solid var(--border);box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:6px;
  transition:transform .2s,box-shadow .2s,background .25s;cursor:default;
}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(27,79,140,.15)}
.stat-card .label{font-size:13px;color:var(--text-2);font-weight:600}
.stat-card .value{font-size:30px;font-weight:900;color:var(--blue)}
.stat-card .icon{font-size:26px}
.stat-card.green .value{color:var(--green)}
.stat-card.orange .value{color:var(--orange)}
.stat-card.red .value{color:var(--red)}

.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);transition:background .25s,border-color .25s}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:16px;font-weight:700;color:var(--blue)}
.card-body{padding:20px}

.btn{padding:9px 18px;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .18s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-d);transform:translateY(-1px)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#145c39;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:var(--red-l);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-icon{width:34px;height:34px;padding:0;justify-content:center;border-radius:8px}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:13px;font-weight:700;color:var(--text-2);padding:10px 14px;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap}
[dir="ltr"] th{text-align:left}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle;color:var(--text)}
tr:hover td{background:var(--bg)}
tr:last-child td{border-bottom:none}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:12px;font-weight:700;white-space:nowrap}
.badge-blue{background:var(--blue-l);color:var(--blue)}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-orange{background:var(--orange-l);color:var(--orange)}
.badge-gray{background:var(--border);color:var(--text-2)}

.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;font-weight:700;color:var(--text-2)}
.form-group input,.form-group select,.form-group textarea{
  border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;
  font-size:14px;color:var(--text);background:var(--input-bg);transition:border .15s,background .25s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue)}
.form-group textarea{resize:vertical;min-height:80px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:center;justify-content:center;z-index:200;
  padding:20px;backdrop-filter:blur(3px);
}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease}
.modal{
  background:var(--card);border-radius:16px;width:100%;max-width:560px;
  max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.25);
  animation:modalIn .22s ease both;
}
.modal-header{
  padding:20px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--card);z-index:10;
}
.modal-header h2{font-size:18px;font-weight:700;color:var(--blue)}
.modal-close{font-size:20px;color:var(--text-2);cursor:pointer;padding:4px 8px;border-radius:6px;transition:.15s}
.modal-close:hover{background:var(--border)}
.modal-body{padding:24px}

.kanban-wrap{overflow-x:auto;padding-bottom:20px}
.kanban{display:flex;gap:16px;align-items:flex-start;min-width:max-content}
.kanban-col{width:260px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);flex-shrink:0;transition:border-color .2s}
.kanban-col-header{padding:12px 16px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius) var(--radius) 0 0}
.kanban-col-body{padding:10px;min-height:200px;display:flex;flex-direction:column;gap:8px}
.kanban-card{
  background:var(--card);border-radius:10px;border:1px solid var(--border);
  padding:14px;cursor:grab;transition:box-shadow .2s,transform .15s;
}
.kanban-card:hover{box-shadow:0 4px 16px rgba(27,79,140,.15);transform:translateY(-2px)}
.kanban-card.dragging{opacity:.45;cursor:grabbing;transform:rotate(2deg)}
.kanban-col.drag-over .kanban-col-body{background:var(--blue-l)}
.kanban-card h4{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--text)}
.kanban-card .meta{font-size:12px;color:var(--text-2);display:flex;flex-direction:column;gap:3px}
.kanban-card .value-tag{margin-top:8px;font-size:13px;font-weight:700;color:var(--green)}

.empty{text-align:center;padding:60px 20px;color:var(--text-2)}
.empty .emoji{font-size:48px;margin-bottom:12px}
.empty h3{font-size:17px;font-weight:700;margin-bottom:6px;color:var(--text)}
.empty p{font-size:14px}

.search-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.search-input-wrap{position:relative;flex:1;min-width:200px}
.search-input-wrap input{width:100%;padding:9px 14px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--card);color:var(--text)}
[dir="rtl"] .search-input-wrap input{padding:9px 36px 9px 14px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-2)}
[dir="rtl"] .search-icon{left:auto;right:10px}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}
.followup-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.followup-item:last-child{border-bottom:none}
.contact-row-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.contact-row-item:last-child{border-bottom:none}

.prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.prop-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
.prop-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(27,79,140,.18)}
.prop-thumb{height:140px;background:linear-gradient(135deg,var(--blue-l),#c5d8f5);display:flex;align-items:center;justify-content:center;font-size:48px}
.prop-body{padding:16px}
.prop-title{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--text)}
.prop-price{font-size:20px;font-weight:900;color:var(--green);margin-bottom:8px}
.prop-meta{font-size:12px;color:var(--text-2);display:flex;flex-wrap:wrap;gap:8px}
.prop-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}

.agent-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;display:flex;align-items:center;gap:16px;transition:transform .2s,box-shadow .2s}
.agent-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.agent-avatar{width:54px;height:54px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--blue),var(--green));display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700}
.agent-info{flex:1}
.agent-name{font-size:16px;font-weight:700;color:var(--text)}
.agent-email{font-size:13px;color:var(--text-2);margin-top:2px}
.agent-stats{display:flex;gap:16px;margin-top:10px}
.agent-stat{font-size:12px;color:var(--text-2)}
.agent-stat strong{display:block;font-size:18px;color:var(--blue);font-weight:900}

.profile-avatar-wrap{text-align:center;padding:40px 20px}
.profile-avatar{
  width:100px;height:100px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--green));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:42px;font-weight:900;margin:0 auto 16px;
  box-shadow:0 8px 24px rgba(27,79,140,.25);
}
.profile-name{font-size:24px;font-weight:900;margin-bottom:4px;color:var(--text)}
.profile-email{color:var(--text-2);margin-bottom:10px}
.profile-agency{margin-top:14px;padding:10px 16px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--text-2);display:inline-block}

.settings-section{margin-bottom:32px}
.settings-section h3{font-size:16px;font-weight:700;color:var(--blue);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.plan-card{background:linear-gradient(135deg,var(--blue),var(--green));color:#fff;border-radius:var(--radius);padding:24px;margin-bottom:20px}
.plan-name{font-size:22px;font-weight:900;margin-bottom:4px}

.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.loading-center{display:flex;justify-content:center;padding:60px}

.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1a2332;color:#fff;padding:12px 24px;border-radius:10px;
  font-size:14px;font-weight:600;opacity:0;transition:all .3s ease;
  z-index:1000;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.toast-error{background:#DC2626}
.toast.toast-success{background:#1D7A4E}

@media(max-width:768px){
  #sidebar{right:-240px;transition:.3s;box-shadow:none}
  [dir="ltr"] #sidebar{right:auto;left:-240px}
  #sidebar.open{right:0}
  [dir="ltr"] #sidebar.open{left:0}
  #main{margin-right:0;margin-left:0}
  #content{padding:16px}
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="icon">و</div>
      <div><div class="name">وسيط CRM</div><div class="sub">Waseet</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard"><span class="ico">📊</span><span data-t="dashboard">لوحة التحكم</span></div>
      <div class="nav-item" data-page="contacts"><span class="ico">👥</span><span data-t="contacts">العملاء</span></div>
      <div class="nav-item" data-page="deals"><span class="ico">💼</span><span data-t="deals">الصفقات</span></div>
      <div class="nav-item" data-page="properties"><span class="ico">🏠</span><span data-t="properties">العقارات</span></div>
      <div class="nav-item" data-page="followups">
        <span class="ico">🔔</span><span data-t="followups">التذكيرات</span>
        <span class="nav-badge" id="followup-badge" style="display:none">0</span>
      </div>
      <div class="nav-item" data-page="team" id="nav-team"><span class="ico">👤</span><span data-t="team">الفريق</span></div>
      <div class="nav-item" data-page="profile"><span class="ico">🪪</span><span data-t="profile">ملفي الشخصي</span></div>
      <div class="nav-item" data-page="settings"><span class="ico">⚙️</span><span data-t="settings">الإعدادات</span></div>
    </nav>
    <div class="sidebar-footer">
      <div class="trial-bar" id="trial-info">⏳ ...</div>
      <div style="font-size:12px">وسيط CRM © 2026</div>
    </div>
  </div>

  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="icon-btn" id="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" style="display:none">☰</button>
        <div class="page-title" id="page-title">لوحة التحكم</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" id="topbar-add-btn" onclick="openAddModal()">+ إضافة</button>
        <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
        <button class="lang-pill" onclick="toggleLang()" id="lang-btn">EN</button>
        <div class="user-chip" onclick="navigate('profile')">
          <div class="avatar" id="user-avatar">خ</div>
          <span id="user-name">...</span>
        </div>
        <button class="btn btn-outline btn-sm" onclick="logout()" data-t="logout">خروج</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">إضافة</h2>
      <span class="modal-close" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ── TRANSLATIONS ────────────────────────────────────────────────────────────
const TR = {
  ar:{
    dashboard:'لوحة التحكم',contacts:'العملاء',deals:'الصفقات',
    properties:'العقارات',followups:'التذكيرات',team:'الفريق',
    settings:'الإعدادات',profile:'ملفي الشخصي',logout:'خروج',
    add:'+ إضافة',save:'💾 حفظ',cancel:'إلغاء',edit:'تعديل',invite:'✉️ دعوة',done:'تم ✓',
    totalContacts:'إجمالي العملاء',openDeals:'صفقات مفتوحة',
    closedMonth:'مغلقة هذا الشهر',revenueMonth:'عمولة هذا الشهر',
    followupsToday:'تذكيرات اليوم',agents:'الوسطاء',

let LANG = localStorage.getItem('waseet_lang') || 'ar';
let THEME = localStorage.getItem('waseet_theme') || 'light';

function t(k){ return TR[LANG][k] || TR.ar[k] || k }

function applyLang(){
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('lang-btn').textContent = LANG === 'ar' ? 'EN' : 'عر';
  document.querySelectorAll('[data-t]').forEach(el => {
    if(TR[LANG][el.dataset.t]) el.textContent = TR[LANG][el.dataset.t];
  });
}
function toggleLang(){
  LANG = LANG === 'ar' ? 'en' : 'ar';
  localStorage.setItem('waseet_lang', LANG);
  applyLang();
  if(currentPage) navigate(currentPage);
}
function applyTheme(){
  document.documentElement.setAttribute('data-theme', THEME);
  document.getElementById('theme-btn').textContent = THEME === 'dark' ? '☀️' : '🌙';
}
function toggleTheme(){
  THEME = THEME === 'dark' ? 'light' : 'dark';
  localStorage.setItem('waseet_theme', THEME);
  applyTheme();
}

// ── STATE ───────────────────────────────────────────────────────────────────
let currentPage = 'dashboard', currentUser = null, currentAgency = null, editingId = null;
const TOKEN_KEY = 'waseet_token';
function getToken(){ return localStorage.getItem(TOKEN_KEY) }
function clearToken(){ localStorage.removeItem(TOKEN_KEY) }

async function api(method, path, body){
  const opts = { method, headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()} };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch('/api'+path, opts);
  const data = await res.json();
  if(!res.ok) throw new Error(data.error || 'Error');
  return data;
}

// ── AUTH ────────────────────────────────────────────────────────────────────
async function initApp(){
  applyTheme(); applyLang();
  if(window.innerWidth <= 768) document.getElementById('menu-btn').style.display='flex';
  if(!getToken()){ window.location.href='/login.html'; return; }
  try{
    const {user,agency} = await api('GET','/auth/me');
    currentUser = user; currentAgency = agency;
    document.getElementById('user-name').textContent = user.name;
    document.getElementById('user-avatar').textContent = user.name.charAt(0).toUpperCase();
    const trialEl = document.getElementById('trial-info');
    if(agency.plan==='trial' && agency.trial_ends){
      const days = Math.ceil((new Date(agency.trial_ends)-new Date())/86400000);
      trialEl.textContent = days > 0 ? `⏳ ${days} ${t('daysLeft')}` : `⚠️ ${t('trialExpired')}`;
      trialEl.style.borderColor = days < 7 ? 'rgba(255,100,100,.5)' : 'rgba(255,200,0,.3)';
    } else { trialEl.textContent = `✅ ${agency.plan}`; }
    if(user.role !== 'admin') document.getElementById('nav-team').style.display='none';
    navigate('dashboard');
    loadFollowupBadge();
  } catch(e){ clearToken(); window.location.href='/login.html'; }
}

async function loadFollowupBadge(){
  try{
    const {followups} = await api('GET','/followups');
    const badge = document.getElementById('followup-badge');
    badge.textContent = followups.length;
    badge.style.display = followups.length > 0 ? 'inline-block' : 'none';
  }catch(e){}
}

function logout(){ clearToken(); window.location.href='/login.html'; }

const ADD_KEYS = {contacts:'newContact',deals:'newDeal',properties:'newProperty',followups:'newFollowup',team:'newAgent'};

function navigate(page){
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page===page));
  document.getElementById('page-title').textContent = t(page) || page;
  const addBtn = document.getElementById('topbar-add-btn');
  if(ADD_KEYS[page]){ addBtn.textContent = t(ADD_KEYS[page]); addBtn.style.display='flex'; }
  else { addBtn.style.display='none'; }
  renderPage(page);
}

document.querySelectorAll('.nav-item').forEach(el => el.addEventListener('click',()=>navigate(el.dataset.page)));

async function renderPage(page){
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  try{
    switch(page){
      case 'dashboard':  await renderDashboard(); break;
      case 'contacts':   await renderContacts(); break;
      case 'deals':      await renderDeals(); break;
      case 'properties': await renderProperties(); break;
      case 'followups':  await renderFollowups(); break;
      case 'team':       await renderTeam(); break;
      case 'profile':    renderProfile(); break;
      case 'settings':   renderSettings(); break;
    }
  }catch(e){ content.innerHTML=`<div class="alert" style="background:var(--red-l);color:var(--red);border-radius:8px;padding:14px">${e.message}</div>`; }
}

async function saveContact(e){
  e.preventDefault();
  const fd=new FormData(e.target), data=Object.fromEntries(fd);
  if(data.budget_min) data.budget_min=parseFloat(data.budget_min);
  if(data.budget_max) data.budget_max=parseFloat(data.budget_max);
  try{
    if(editingId) await api('PUT','/contacts/'+editingId,data);
    else await api('POST','/contacts',data);
    closeModal(); await renderContacts(); loadFollowupBadge();
    showToast(t('profileSaved').replace('الملف الشخصي',''));
  }catch(err){ showToast(err.message,'error'); }
}

async function editContact(id){
  const {contact}=await api('GET','/contacts/'+id);
  editingId=id; openModal(t('editContact'),contactForm(contact));
}
async function deleteContact(id,name){
  if(!confirm(t('confirmDelete'))) return;
  await api('DELETE','/contacts/'+id); renderContacts();
}

      <div class="kanban-wrap"><div class="kanban">

async function renderFollowups(){
  const {followups}=await api('GET','/followups');
  const today=new Date().toISOString().split('T')[0];
  const overdue=followups.filter(f=>f.due_date<today);
  const todayF=followups.filter(f=>f.due_date===today);
  const upcoming=followups.filter(f=>f.due_date>today);

  function fRow(f){
    const late=f.due_date<today;
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
      <div class="avatar" style="width:38px;height:38px;font-size:14px;flex-shrink:0">${(f.contact_name||'?').charAt(0)}</div>
      <div style="flex:1">
        <div style="font-weight:700;color:var(--text)">${f.contact_name||'—'}</div>
        ${f.note?`<div style="font-size:13px;color:var(--text-2)">${f.note}</div>`:''}
        <div style="font-size:12px;color:${late?'var(--red)':'var(--orange)'};font-weight:600;margin-top:2px">
          ${late?t('lateLabel')+' ':''}${formatDate(f.due_date)}
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-green btn-sm" onclick="doneFollowup(${f.id})">${t('done')}</button>
        <button class="btn btn-danger btn-sm btn-icon" onclick="deleteFollowup(${f.id})">🗑️</button>
      </div>
    </div>`;
  }

  document.getElementById('content').innerHTML=`
    <div class="page-enter">
      ${overdue.length?`<div class="card" style="margin-bottom:20px;border-color:var(--red)">
        <div class="card-header"><h3 style="color:var(--red)">${t('overdue')} (${overdue.length})</h3></div>
        <div class="card-body">${overdue.map(fRow).join('')}</div>
      </div>`:''}
      <div class="card" style="margin-bottom:20px">
        <div class="card-header"><h3>${t('today')} (${todayF.length})</h3></div>
        <div class="card-body">${todayF.length?todayF.map(fRow).join(''):`<div class="empty" style="padding:20px"><div>${t('noTodayFU')}</div></div>`}</div>
      </div>
      <div class="card">
        <div class="card-header"><h3>${t('upcoming')} (${upcoming.length})</h3></div>
        <div class="card-body">${upcoming.length?upcoming.map(fRow).join(''):`<div class="empty" style="padding:20px"><div>${t('noUpcomingFU')}</div></div>`}</div>
      </div>
    </div>`;
  loadFollowupBadge();
}

// ── MODAL ───────────────────────────────────────────────────────────────────
function openModal(title,html){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); editingId=null; }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target===document.getElementById('modal')) closeModal(); });

async function openAddModal(){
  editingId=null;
  switch(currentPage){
    case 'contacts':   openModal(t('newContact'),contactForm()); break;
    case 'deals':      openModal(t('newDeal'),await dealForm()); break;
    case 'properties': openModal(t('newProperty'),propertyForm()); break;
    case 'followups':  openModal(t('newFollowup'),await followupForm()); break;
    case 'team':       openModal(t('inviteAgent'),agentForm()); break;
  }
}

// ── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg,type='success'){
  document.querySelectorAll('.toast').forEach(el=>el.remove());
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.classList.add('show'),10);
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),300); },3000);
}

// ── UTILS ───────────────────────────────────────────────────────────────────
function formatSAR(n){
  if(!n && n!==0) return '—';
  return LANG==='en'?'SAR '+Number(n).toLocaleString('en-US'):Number(n).toLocaleString('ar-SA')+' ريال';
}
function formatDate(d){
  if(!d) return '—';
  return new Date(d).toLocaleDateString(LANG==='en'?'en-US':'ar-SA',{year:'numeric',month:'short',day:'numeric'});
}
function statusLabel(s){ return STATUS_LABELS[LANG]?.[s]||s; }
function statusBadge(s){
  const m={'جديد':'badge-blue','متابعة':'badge-orange','مهتم':'badge-green','غير مهتم':'badge-red','مغلق':'badge-gray','متاح':'badge-green','محجوز':'badge-orange','مباع':'badge-gray'};
  return `<span class="badge ${m[s]||'badge-gray'}">${statusLabel(s)||'—'}</span>`;
}
